node = "24"
"npm:openclaw" = { version = "2026.6.6", npm_args = "--ignore-scripts=false" }
"npm:ctx7" = "0.5.2"
"pnpm" = "11.7.0"
uv = "0.11.21"
gh = "2.94.0"
"github:openclaw/gogcli" = "0.28.0"
htmlq = "0.4.0"
